<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proxy | Register</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(135deg, #020617, #0f172a 55%, #1d4ed8);
      color: #f8fafc;
    }

    .card {
      width: 100%;
      max-width: 440px;
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid rgba(96, 165, 250, 0.25);
      border-radius: 18px;
      padding: 32px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      color: #38bdf8;
      text-align: center;
    }

    .subtitle {
      margin: 0 0 24px;
      color: #cbd5e1;
      text-align: center;
      font-size: 15px;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      color: #e2e8f0;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.06);
      color: white;
      outline: none;
    }

    input:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(90deg, #38bdf8, #2563eb);
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.95;
    }

    .footer {
      text-align: center;
      margin-top: 16px;
      color: #cbd5e1;
      font-size: 14px;
    }

    .footer a {
      color: #38bdf8;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Create Account</h1>
    <p class="subtitle">Join Proxy and start your crypto journey.</p>

    <form action="/signup" method="POST">
      <div class="field">
        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required />
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Create a password" required />
      </div>

      <button type="submit">Create Account</button>
    </form>

    <div class="footer">
      Already have an account? <a href="login.html">Log in</a>
    </div>
    <div class="footer">
      <a href="dashboard.html">Open dashboard</a>
    </div>
  </div>
</body>
</html>
