<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proxy | Profile</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #020617, #0f172a 60%, #1e3a8a);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid rgba(56, 189, 248, 0.25);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(90deg, #38bdf8, #2563eb);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: bold;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 8px;
      color: #38bdf8;
      font-size: 28px;
    }

    p {
      color: #cbd5e1;
      margin: 0 0 12px;
    }

    .info {
      background: rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 12px;
    }

    .label {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 4px;
    }

    .value {
      font-weight: bold;
      color: white;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">P</div>
    <h1>Profile</h1>
    <p>Welcome back to your Proxy account.</p>

    <div class="info">
      <div class="label">Full Name</div>
      <div class="value">John Doe</div>
    </div>

    <div class="info">
      <div class="label">Email</div>
      <div class="value">john@example.com</div>
    </div>

    <div class="info">
      <div class="label">Investment Plan</div>
      <div class="value">Growth Plan</div>
    </div>
  </div>
</body>
</html>
