<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proxy | Settings</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #020617, #0f172a 60%, #1e3a8a);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 620px;
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid rgba(56, 189, 248, 0.25);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 8px;
      color: #38bdf8;
      font-size: 28px;
    }

    .subtitle {
      color: #cbd5e1;
      margin-bottom: 20px;
    }

    .section {
      background: rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .section h3 {
      margin: 0 0 10px;
      color: #38bdf8;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .row:last-child {
      border-bottom: none;
    }

    .label {
      color: #e2e8f0;
    }

    .value {
      color: #cbd5e1;
    }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(90deg, #38bdf8, #2563eb);
      color: white;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Proxy Settings</h1>
    <p class="subtitle">Manage your account preferences and security settings.</p>

    <div class="section">
      <h3>Account</h3>
      <div class="row">
        <span class="label">Email</span>
        <span class="value">user@proxy.com</span>
      </div>
      <div class="row">
        <span class="label">Password</span>
        <span class="value">••••••••</span>
      </div>
    </div>

    <div class="section">
      <h3>Security</h3>
      <div class="row">
        <span class="label">Two-Factor Authentication</span>
        <button>Enable</button>
      </div>
      <div class="row">
        <span class="label">Login Alerts</span>
        <button>On</button>
      </div>
    </div>

    <div class="section">
      <h3>Notifications</h3>
      <div class="row">
        <span class="label">Investment Updates</span>
        <button>On</button>
      </div>
      <div class="row">
        <span class="label">Market Alerts</span>
        <button>On</button>
      </div>
    </div>
  </div>
</body>
</html>
