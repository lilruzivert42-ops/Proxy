<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proxy Payment</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #020617, #0f172a 60%, #1e3a8a);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .box {
      width: 100%;
      max-width: 480px;
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid rgba(56, 189, 248, 0.25);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 12px;
      color: #38bdf8;
      font-size: 28px;
    }

    .info {
      background: rgba(255,255,255,0.06);
      padding: 14px;
      border-radius: 12px;
      margin-bottom: 14px;
    }

    .label {
      font-size: 14px;
      color: #cbd5e1;
      margin-bottom: 6px;
    }

    .value {
      word-break: break-all;
      font-weight: bold;
      color: white;
    }

    .amount {
      font-size: 22px;
      font-weight: bold;
      color: #4ade80;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Investment Payment</h1>

    <div class="info">
      <div class="label">Wallet Address</div>
      <div class="value"></div>
    </div>

    <div class="info">
      <div class="label">Minimum Deposit</div>
      <div class="amount">$250</div>
    </div>
  </div>
</body>
</html>
