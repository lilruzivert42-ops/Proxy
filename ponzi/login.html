<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proxy Login</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .card {
      background: rgba(0, 0, 0, 0.75);
      padding: 30px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.4);
    }

    h1 {
      text-align: center;
      color: #cbd5e1;
      font-size: 24px;
      margin-top: 0;
      margin-bottom: 12px;
    }

    p {
      text-align: center;
      color: #cbd5e1;
      margin-top: 0;
      margin-bottom: 16px;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      color: #e2e8f0;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.06);
      color: white;
      font-size: 15px;
    }

    input:focus {
      outline: none;
      border-color: #7dd3fc;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(90deg, #38bdf8, #2563eb);
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .footer {
      margin-top: 14px;
      text-align: center;
      font-size: 14px;
      color: #cbd5e1;
    }

    .footer a {
      color: #7dd3fc;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Proxy Login</h1>
    <p>Access your account and continue to your dashboard.</p>

    <form action="/login" method="POST">
      <div class="field">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required />
      </div>

      <button type="submit">Sign In</button>
    </form>

    <div class="footer">
      No account yet? <a href="register.html">Create one</a>
    </div>
    <div class="footer">
      <a href="dashboard.html">Go to dashboard</a>
    </div>
  </div>
</body>
</html>
